version: '3.8'

services:
  todo-app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: todo-app
    ports:
      - "3001:3001"
    volumes:
      - todo-data:/app/backend/data
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001

volumes:
  todo-data:
