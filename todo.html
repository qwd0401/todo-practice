<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        * {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', 'Segoe UI', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
        }

        .glass-dark {
            background: rgba(28, 28, 30, 0.72);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
        }

        .checkbox-wrapper input:checked + div {
            background-color: #007AFF;
            border-color: #007AFF;
        }

        .checkbox-wrapper input:checked + div i {
            opacity: 1;
        }

        .task-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .task-item:hover {
            background-color: rgba(120, 120, 128, 0.08);
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #8E8E93;
        }

        .slide-in {
            animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .slide-out {
            animation: slideOut 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes slideOut {
            to {
                opacity: 0;
                transform: translateX(100%);
            }
        }

        .input-focus:focus {
            outline: none;
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.15);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(120, 120, 128, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(120, 120, 128, 0.3);
        }
    </style>
</head>
<body class="bg-[#F5F5F7] min-h-screen flex items-center justify-center p-4">
    <!-- Main Container -->
    <div class="w-full max-w-md">
        <!-- Glass Card -->
        <div class="glass rounded-3xl shadow-[0_8px_32px_rgba(0,0,0,0.08)] overflow-hidden">
            <!-- Header -->
            <div class="px-8 pt-8 pb-6">
                <div class="flex items-center justify-between mb-2">
                    <h1 class="text-3xl font-semibold text-gray-900 tracking-tight">待办事项</h1>
                    <div class="text-sm text-gray-500 font-medium" id="date-display"></div>
                </div>
                <p class="text-gray-500 text-sm" id="task-summary">加载中...</p>
            </div>

            <!-- Input Area -->
            <div class="px-6 pb-4">
                <div class="relative">
                    <input
                        type="text"
                        id="todo-input"
                        placeholder="添加新任务..."
                        class="w-full h-12 pl-4 pr-14 bg-white/60 border border-gray-200/60 rounded-2xl text-gray-800 placeholder-gray-400 text-[15px] input-focus transition-all"
                        autocomplete="off"
                    >
                    <button
                        id="add-btn"
                        class="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 bg-[#007AFF] hover:bg-[#0051D5] text-white rounded-xl flex items-center justify-center transition-all active:scale-95"
                    >
                        <i class="fas fa-plus text-sm"></i>
                    </button>
                </div>
            </div>

            <!-- Filter Tabs -->
            <div class="px-6 pb-4">
                <div class="flex gap-1 bg-gray-200/50 p-1 rounded-xl">
                    <button class="filter-btn flex-1 h-8 rounded-lg text-[13px] font-medium text-gray-600 transition-all bg-white shadow-sm" data-filter="all">全部</button>
                    <button class="filter-btn flex-1 h-8 rounded-lg text-[13px] font-medium text-gray-500 hover:text-gray-700 transition-all" data-filter="active">进行中</button>
                    <button class="filter-btn flex-1 h-8 rounded-lg text-[13px] font-medium text-gray-500 hover:text-gray-700 transition-all" data-filter="completed">已完成</button>
                </div>
            </div>

            <!-- Todo List -->
            <div class="px-2 pb-2">
                <ul id="todo-list" class="max-h-[400px] overflow-y-auto px-4 pb-4 space-y-1">
                    <!-- Tasks will be inserted here -->
                </ul>

                <!-- Empty State -->
                <div id="empty-state" class="hidden py-12 flex flex-col items-center justify-center text-center">
                    <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mb-4">
                        <i class="fas fa-check text-2xl text-gray-300"></i>
                    </div>
                    <p class="text-gray-400 text-sm font-medium">没有任务</p>
                    <p class="text-gray-300 text-xs mt-1">享受你的一天！</p>
                </div>
            </div>

            <!-- Footer -->
            <div class="px-6 py-4 bg-gray-50/50 border-t border-gray-100">
                <button
                    id="clear-completed"
                    class="text-[13px] text-gray-400 hover:text-red-500 transition-colors font-medium"
                >
                    清除已完成
                </button>
            </div>
        </div>

        <!-- Footer Text -->
        <p class="text-center text-gray-400 text-xs mt-6">按 Enter 快速添加任务</p>
    </div>

    <script>
        // Todo App Logic
        class TodoApp {
            constructor() {
                this.todos = JSON.parse(localStorage.getItem('todos')) || [];
                this.filter = 'all';
                this.init();
            }

            init() {
                this.cacheElements();
                this.bindEvents();
                this.render();
                this.updateDate();
            }

            cacheElements() {
                this.input = document.getElementById('todo-input');
                this.addBtn = document.getElementById('add-btn');
                this.list = document.getElementById('todo-list');
                this.emptyState = document.getElementById('empty-state');
                this.summary = document.getElementById('task-summary');
                this.dateDisplay = document.getElementById('date-display');
                this.filterBtns = document.querySelectorAll('.filter-btn');
                this.clearBtn = document.getElementById('clear-completed');
            }

            bindEvents() {
                this.addBtn.addEventListener('click', () => this.addTodo());
                this.input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.addTodo();
                });

                this.filterBtns.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.filter = e.target.dataset.filter;
                        this.updateFilterUI();
                        this.render();
                    });
                });

                this.clearBtn.addEventListener('click', () => this.clearCompleted());
            }

            addTodo() {
                const text = this.input.value.trim();
                if (!text) return;

                const todo = {
                    id: Date.now(),
                    text: text,
                    completed: false,
                    createdAt: new Date()
                };

                this.todos.unshift(todo);
                this.save();
                this.input.value = '';
                this.render();
            }

            toggleTodo(id) {
                const todo = this.todos.find(t => t.id === id);
                if (todo) {
                    todo.completed = !todo.completed;
                    this.save();
                    this.render();
                }
            }

            deleteTodo(id) {
                const el = document.querySelector(`[data-id="${id}"]`);
                if (el) {
                    el.classList.add('slide-out');
                    setTimeout(() => {
                        this.todos = this.todos.filter(t => t.id !== id);
                        this.save();
                        this.render();
                    }, 300);
                }
            }

            clearCompleted() {
                this.todos = this.todos.filter(t => !t.completed);
                this.save();
                this.render();
            }

            getFilteredTodos() {
                switch (this.filter) {
                    case 'active':
                        return this.todos.filter(t => !t.completed);
                    case 'completed':
                        return this.todos.filter(t => t.completed);
                    default:
                        return this.todos;
                }
            }

            updateFilterUI() {
                this.filterBtns.forEach(btn => {
                    if (btn.dataset.filter === this.filter) {
                        btn.className = 'filter-btn flex-1 h-8 rounded-lg text-[13px] font-medium text-gray-600 transition-all bg-white shadow-sm';
                    } else {
                        btn.className = 'filter-btn flex-1 h-8 rounded-lg text-[13px] font-medium text-gray-500 hover:text-gray-700 transition-all';
                    }
                });
            }

            updateDate() {
                const now = new Date();
                const options = { month: 'long', day: 'numeric', weekday: 'short' };
                this.dateDisplay.textContent = now.toLocaleDateString('zh-CN', options);
            }

            updateSummary() {
                const activeCount = this.todos.filter(t => !t.completed).length;
                const totalCount = this.todos.length;

                if (totalCount === 0) {
                    this.summary.textContent = '开始添加你的第一个任务';
                } else if (activeCount === 0) {
                    this.summary.textContent = '太棒了！所有任务都已完成';
                } else {
                    this.summary.textContent = `${activeCount} 个待办任务，共 ${totalCount} 个`;
                }
            }

            save() {
                localStorage.setItem('todos', JSON.stringify(this.todos));
            }

            render() {
                const filtered = this.getFilteredTodos();

                if (filtered.length === 0) {
                    this.list.innerHTML = '';
                    this.emptyState.classList.remove('hidden');
                } else {
                    this.emptyState.classList.add('hidden');
                    this.list.innerHTML = filtered.map(todo => `
                        <li
                            data-id="${todo.id}"
                            class="task-item ${todo.completed ? 'completed' : ''} slide-in flex items-center gap-3 px-3 py-3 rounded-xl group cursor-pointer"
                        >
                            <label class="checkbox-wrapper flex-shrink-0 cursor-pointer">
                                <input
                                    type="checkbox"
                                    class="hidden"
                                    ${todo.completed ? 'checked' : ''}
                                    onchange="app.toggleTodo(${todo.id})"
                                >
                                <div class="w-5 h-5 rounded-full border-2 border-gray-300 flex items-center justify-center transition-all">
                                    <i class="fas fa-check text-white text-[10px] opacity-0 transition-opacity"></i>
                                </div>
                            </label>

                            <span class="task-text flex-1 text-[15px] text-gray-700 select-none">${this.escapeHtml(todo.text)}</span>

                            <button
                                onclick="app.deleteTodo(${todo.id})"
                                class="w-7 h-7 flex items-center justify-center text-gray-300 hover:text-red-500 hover:bg-red-50 rounded-lg opacity-0 group-hover:opacity-100 transition-all"
                            >
                                <i class="fas fa-trash-alt text-xs"></i>
                            </button>
                        </li>
                    `).join('');
                }

                this.updateSummary();
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }

        // Initialize
        const app = new TodoApp();
    </script>
</body>
</html>
